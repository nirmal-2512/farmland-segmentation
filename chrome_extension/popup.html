<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmland Boundary Detector</title>
  <style>
    body { font-family: Arial, sans-serif; width: 300px; padding: 16px; }
    button { width: 100%; padding: 10px; margin: 8px 0; font-size: 14px; }
    input, textarea { width: 100%; margin: 8px 0; padding: 8px; font-size: 13px; }
    .status { margin: 10px 0; font-size: 13px; }
    .note { color: #555; font-size: 12px; }
  </style>
</head>
<body>
  <h2>Farmland Boundary</h2>
  <button id="captureButton">Capture Tile & Detect</button>
  <button id="clearOverlayButton">Clear Overlay</button>
  <button id="downloadButton" disabled>Download GeoJSON</button>
  <button id="downloadKmlButton" disabled>Download KML</button>
  <div class="status" id="status">Status: ready</div>
  <textarea id="geojsonText" rows="10" placeholder="GeoJSON will appear here..."></textarea>
  <div class="note">Requires Google Maps/Google Earth tab and local FastAPI server at <code>http://localhost:8000</code>.</div>
  <script src="popup.js"></script>
</body>
</html>
